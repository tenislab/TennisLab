  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

);\n  --glass:rgba(18,17,16,.72);\n  --maxw:1300px;\n  --head:'Archivo',system-ui,sans-serif;\n  --body:'Hanken Grotesk',system-ui,sans-serif;\n  --mono:'Space Mono',ui-monospace,monospace;\n}\n\n/* ---------- light theme — warm sand ---------- */\n:root[data-theme=\"light\"]{\n  --ink:#F3EDE5;\n  --ink-2:#FFFFFF;\n  --ink-3:#EBE3D8;\n  --ink-4:#DDD2C4;\n  --line:rgba(40,28,20,.12);\n  --line-2:rgba(40,28,20,.24);\n  --paper:#1F140C;\n  --txt:#241B14;\n  --txt-2:#5C5048;\n  --txt-3:#8C7F74;\n  --ball:#D65F2A;\n  --ball-dim:#B14A1C;\n  --ball-ink:#FFF2EA;\n  --shadow:0 12px 30px -16px rgba(60,36,20,.30);\n  --shadow-lg:0 26px 60px -26px rgba(60,36,20,.36);\n  --glass:rgba(243,237,229,.82);\n}\n\n*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}\nhtml,body{height:100%}\nbody{\n  font-family:var(--body);\n  background:var(--ink);\n  color:var(--txt);\n  -webkit-font-smoothing:antialiased;\n  text-rendering:optimizeLegibility;\n  overflow-x:hidden;\n}\nimg{max-width:100%;display:block}\nbutton{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}\ninput,textarea,select{font-family:inherit}\n::selection{background:var(--ball);color:var(--ball-ink)}\n\n/* subtle court-line texture in the page bg */\n.bg-grid{\n  position:fixed;inset:0;z-index:0;pointer-events:none;\n  background:\n    radial-gradient(1100px 560px at 84% -14%, rgba(232,112,61,.13), transparent 60%),\n    radial-gradient(760px 440px at -12% 110%, rgba(232,112,61,.06), transparent 60%),\n    repeating-linear-gradient(0deg, rgba(255,236,222,.018) 0 1px, transparent 1px 52px);\n}\n:root[data-theme=\"light\"] .bg-grid{\n  background:\n    radial-gradient(1100px 560px at 84% -14%, rgba(214,95,42,.12), transparent 60%),\n    repeating-linear-gradient(0deg, rgba(40,28,20,.02) 0 1px, transparent 1px 52px);\n}\n\n.app{position:relative;z-index:1;min-height:100%}\n\n/* ---------- loading screen ---------- */\n.loader{\n  position:fixed;inset:0;z-index:500;display:grid;place-items:center;\n  background:radial-gradient(900px 600px at 50% 40%, var(--ink-3), var(--ink) 70%);\n  transition:opacity .5s ease, visibility .5s ease;\n}\n.loader.gone{opacity:0;visibility:hidden;pointer-events:none}\n.loader-inner{display:flex;flex-direction:column;align-items:center;gap:0}\n.bounce{position:relative;height:150px;width:120px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end}\n.tl-ball{width:64px;height:64px;animation:tl-bounce 1.05s cubic-bezier(.5,.05,.5,.95) infinite;transform-origin:50% 100%}\n.tl-ball svg{width:100%;height:100%;display:block;filter:drop-shadow(0 6px 10px rgba(0,0,0,.4))}\n.shadow{\n  position:absolute;bottom:8px;width:54px;height:11px;border-radius:50%;\n  background:rgba(0,0,0,.55);filter:blur(3px);animation:tl-shadow 1.05s cubic-bezier(.5,.05,.5,.95) infinite;\n}\n@keyframes tl-bounce{\n  0%{transform:translateY(-86px) scaleY(1) scaleX(1)}\n  45%{transform:translateY(0) scaleY(1) scaleX(1)}\n  52%{transform:translateY(2px) scaleY(.78) scaleX(1.18)}\n  60%{transform:translateY(0) scaleY(1) scaleX(1)}\n  100%{transform:translateY(-86px) scaleY(1) scaleX(1)}\n}\n@keyframes tl-shadow{\n  0%{transform:scale(.6);opacity:.3}\n  50%{transform:scale(1);opacity:.6}\n  100%{transform:scale(.6);opacity:.3}\n}\n.loader-word{\n  font-family:var(--head);font-weight:900;text-transform:uppercase;letter-spacing:-.01em;\n  font-size:30px;color:var(--txt);margin-top:18px;opacity:0;animation:tl-fade .6s ease .25s forwards;\n}\n.loader-word span{color:var(--ball)}\n.loader-bar{margin-top:18px;width:148px;height:4px;border-radius:999px;background:var(--ink-4);overflow:hidden;opacity:0;animation:tl-fade .5s ease .4s forwards}\n.loader-bar i{display:block;height:100%;width:40%;border-radius:999px;background:var(--ball);animation:tl-load 1.4s ease-in-out infinite}\n@keyframes tl-fade{to{opacity:1}}\n@keyframes tl-load{\n  0%{transform:translateX(-120%)}\n  60%{transform:translateX(260%)}\n  100%{transform:translateX(260%)}\n}\n@media (prefers-reduced-motion: reduce){\n  .tl-ball,.shadow,.loader-bar i{animation:none}\n  .loader-word,.loader-bar{opacity:1;animation:none}\n}\n\n/* ---------- type ---------- */\n.kicker{\n  font-family:var(--mono);font-size:12px;letter-spacing:.22em;text-transform:uppercase;\n  color:var(--txt-3);\n}\nh1,h2,h3{font-family:var(--head);font-weight:800;line-height:.98;letter-spacing:-.01em}\n.display{\n  font-family:var(--head);font-weight:900;letter-spacing:-.02em;line-height:.9;\n  text-transform:uppercase;\n}\n\n/* ---------- buttons ---------- */\n.btn{\n  display:inline-flex;align-items:center;justify-content:center;gap:10px;\n  font-family:var(--head);font-weight:700;letter-spacing:.01em;\n  border-radius:999px;padding:14px 22px;font-size:15px;line-height:1;\n  transition:transform .12s ease, background .15s ease, border-color .15s, color .15s;\n  white-space:nowrap;border:1.5px solid transparent;user-select:none;\n}\n.btn:active{transform:translateY(1px) scale(.99)}\n.btn svg{width:18px;height:18px;flex:none}\n.btn-primary{background:var(--ball);color:var(--ball-ink)}\n.btn-primary:hover{filter:brightness(1.07) saturate(1.05)}\n.btn-ghost{background:var(--ink-3);color:var(--txt);border-color:var(--line)}\n.btn-ghost:hover{border-color:var(--line-2);background:var(--ink-4)}\n.btn-line{background:transparent;color:var(--txt);border-color:var(--line-2)}\n.btn-line:hover{border-color:var(--ball);color:var(--ball)}\n.btn-lg{padding:18px 30px;font-size:18px}\n.btn-sm{padding:9px 14px;font-size:13px}\n.btn-icon{width:42px;height:42px;padding:0;border-radius:12px}\n.btn[disabled]{opacity:.4;pointer-events:none}\n\n/* ---------- header ---------- */\n.topbar{\n  position:sticky;top:0;z-index:40;\n  display:flex;align-items:center;gap:16px;\n  padding:16px clamp(16px,4vw,40px);\n  background:linear-gradient(var(--ink),var(--glass));\n  backdrop-filter:blur(10px);\n  border-bottom:1px solid var(--line);\n}\n.brand{display:flex;align-items:center;gap:12px;cursor:pointer}\n.brand-mark{\n  width:40px;height:40px;border-radius:12px;flex:none;position:relative;\n  background:linear-gradient(150deg,#1E242A,#101316);\n  display:grid;place-items:center;\n  box-shadow:inset 0 0 0 1px rgba(255,255,255,.08), 0 4px 12px -3px rgba(0,0,0,.45);\n}\n.brand-mark svg{width:30px;height:30px;display:block}\n.brand-name{font-family:var(--head);font-weight:900;letter-spacing:-.01em;font-size:19px;line-height:1}\n.brand-name small{display:block;font-family:var(--mono);font-weight:400;font-size:10px;letter-spacing:.24em;color:var(--txt-3);margin-top:3px}\n.spacer{flex:1}\n\n.lang-toggle{display:flex;background:var(--ink-3);border-radius:999px;padding:3px;border:1px solid var(--line)}\n.lang-toggle button{\n  font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:.06em;\n  padding:6px 12px;border-radius:999px;color:var(--txt-3);transition:.15s;\n}\n.lang-toggle button.on{background:var(--ball);color:var(--ball-ink)}\n\n/* ---------- layout ---------- */\n.wrap{max-width:var(--maxw);margin:0 auto;padding:0 clamp(16px,4vw,40px)}\n.view{animation:viewin .42s cubic-bezier(.22,.7,.3,1) both}\n@keyframes viewin{from{opacity:0;transform:translateY(14px) scale(.992)}to{opacity:1;transform:none}}\n/* staggered card entrance */\n.cards .tcard,.dash .dstat,.quick-row .qrow,.analytics .an-card,.match-list .mcard,\n.cal-list .cal-row,.diary-list .diary-card,.goals-list .goal-card,.rcard{\n  animation:cardin .5s cubic-bezier(.22,.7,.3,1) both;\n}\n@keyframes cardin{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}\n.cards .tcard:nth-child(2),.dash .dstat:nth-child(2),.match-list .mcard:nth-child(2){animation-delay:.05s}\n.cards .tcard:nth-child(3),.dash .dstat:nth-child(3),.match-list .mcard:nth-child(3){animation-delay:.1s}\n.cards .tcard:nth-child(4),.dash .dstat:nth-child(4),.match-list .mcard:nth-child(4){animation-delay:.15s}\n.cards .tcard:nth-child(5){animation-delay:.2s}\n.cards .tcard:nth-child(6){animation-delay:.25s}\n.cards .tcard:nth-child(n+7){animation-delay:.3s}\n/* bars + progress grow */\n.bar-fill,.goal-fill{animation:barin .7s cubic-bezier(.3,.8,.4,1) both}\n@keyframes barin{from{width:0!important}}\n@media (prefers-reduced-motion: reduce){\n  .view,.cards .tcard,.dash .dstat,.quick-row .qrow,.analytics .an-card,.match-list .mcard,\n  .cal-list .cal-row,.diary-list .diary-card,.goals-list .goal-card,.rcard,.bar-fill,.goal-fill{animation:none}}\n/* manual \"reduce animations\" toggle (Ajustes) — kills motion app-wide */\nhtml.no-anim *,html.no-anim *::before,html.no-anim *::after{\n  animation-duration:.001s!important;animation-iteration-count:1!important;transition-duration:.001s!important;scroll-behavior:auto!important}\n\n/* ============================================================\n   HOME\n   ============================================================ */\n.hero{padding:clamp(36px,7vw,76px) 0 clamp(28px,5vw,52px);position:relative}\n.hero-grid{display:grid;grid-template-columns:1.15fr .85fr;gap:48px;align-items:center}\n.hero h1{font-size:clamp(44px,8.6vw,104px);text-transform:uppercase;letter-spacing:-.022em;margin-left:-.02em}\n.hero h1 .y{color:var(--txt);white-space:nowrap;\n  background:linear-gradient(transparent 56%, var(--ball) 56%, var(--ball) 90%, transparent 90%);\n  padding:0 .06em;border-radius:2px;}\n.hero p.lead{color:var(--txt-2);font-size:clamp(16px,2vw,21px);max-width:32ch;margin-top:24px;line-height:1.5}\n.hero-cta{display:flex;flex-wrap:wrap;gap:14px;margin-top:32px}\n\n.hero-art{position:relative}\n.hero-court{\n  border-radius:var(--r-l);overflow:hidden;box-shadow:var(--shadow-lg);\n  border:1px solid var(--line);background:var(--ink-2);\n  position:relative;\n}\n.hero-court::after{content:\"\";position:absolute;inset:0;border-radius:var(--r-l);pointer-events:none;\n  box-shadow:inset 0 0 0 1px var(--line);}\n.hero-court svg{display:block;width:100%;height:auto}\n.hero-badge{\n  position:absolute;left:-14px;top:24px;\n  font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;\n  background:var(--ball);color:var(--ball-ink);padding:8px 13px;border-radius:999px;font-weight:700;\n  box-shadow:var(--shadow);transform:rotate(-3deg);\n}\n\n.quick{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:8px}\n.quick-card{\n  display:flex;flex-direction:column;gap:14px;justify-content:space-between;\n  background:var(--ink-2);border:1px solid var(--line);border-radius:var(--r-m);\n  padding:20px;min-height:128px;transition:.16s;text-align:left;\n}\n.quick-card:hover{border-color:var(--line-2);transform:translateY(-2px);background:var(--ink-3)}\n.quick-card .ic{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;background:var(--ink-4)}\n.quick-card .ic svg{width:21px;height:21px;color:var(--ball)}\n.quick-card h3{font-size:18px}\n.quick-card span{color:var(--txt-3);font-size:13px;line-height:1.35}\n\n.section{padding:clamp(30px,5vw,52px) 0}\n.section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:22px}\n.section-head h2{font-size:clamp(24px,3.4vw,34px);text-transform:uppercase}\n.section-head .kicker{margin-bottom:8px}\n.head-actions{display:flex;gap:8px;flex-wrap:wrap}\n\n/* folders */\n.folderbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:18px}\n.fchip{\n  display:inline-flex;align-items:center;gap:7px;font-family:var(--head);font-weight:700;font-size:13px;\n  padding:8px 14px;border-radius:999px;background:var(--ink-2);border:1px solid var(--line);color:var(--txt-2);transition:.14s;\n}\n.fchip:hover{border-color:var(--line-2)}\n.fchip.on{background:var(--paper);color:var(--ink);border-color:var(--paper)}\n.fchip b{font-family:var(--mono);font-weight:700;opacity:.6;font-size:12px}\n.fbar-tools{display:inline-flex;gap:6px;margin-left:4px}\n.x-mini{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;background:var(--ink-3);border:1px solid var(--line);color:var(--txt-2)}\n.x-mini:hover{color:var(--txt);border-color:var(--line-2)}\n.x-mini svg{width:17px;height:17px}\n\n.tcard-num{\n  position:absolute;top:10px;right:10px;font-family:var(--head);font-weight:800;font-size:13px;\n  background:var(--ball);color:var(--ball-ink);padding:3px 9px;border-radius:7px;\n}\n.folder-sel{\n  flex:none;max-width:108px;background:var(--ink-3);border:1px solid var(--line);border-radius:999px;\n  color:var(--txt-2);font-family:var(--body);font-size:12px;padding:0 8px;height:34px;cursor:pointer;\n}\n.folder-sel:focus{outline:none;border-color:var(--ball)}\n\n.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:16px}\n.tcard{\n  content-visibility:auto;contain-intrinsic-size:auto 240px;\n  background:linear-gradient(168deg,var(--ink-3),var(--ink-2));border:1px solid var(--line);border-radius:var(--r-m);\n  overflow:hidden;cursor:pointer;transition:.16s;display:flex;flex-direction:column;\n}\n.tcard:hover{border-color:var(--line-2);transform:translateY(-3px);box-shadow:var(--shadow)}\n.tcard-thumb{aspect-ratio:16/11;position:relative;background:var(--ink-3);overflow:hidden}\n.tcard-thumb svg{position:absolute;inset:0;width:100%;height:100%}\n.thumb-svg{position:absolute;inset:0;display:block}\n.thumb-skel{position:absolute;inset:0;background:linear-gradient(100deg,var(--ink-3) 30%,rgba(255,255,255,.06) 50%,var(--ink-3) 70%);background-size:200% 100%;animation:skel 1.1s ease-in-out infinite}\n@keyframes skel{from{background-position:200% 0}to{background-position:-200% 0}}\n@media (prefers-reduced-motion: reduce){.thumb-skel{animation:none}}\nhtml.no-anim .thumb-skel{animation:none}\n.tcard-surf{\n  position:absolute;top:10px;left:10px;font-family:var(--mono);font-size:10px;\n  letter-spacing:.12em;text-transform:uppercase;padding:5px 9px;border-radius:6px;\n  background:rgba(0,0,0,.5);backdrop-filter:blur(4px);font-weight:700;color:#fff;\n}\n.tcard-surf i{display:inline-block;width:8px;height orm:uppercase;color:var(--txt-3)}\n.d-block{display:flex;flex-direction:column;gap:11px}\n.d-block .kicker{font-size:10px}\n\n/* ---- rival detail: D-style identity panel ---- */\n.idp{background:var(--ink-2);border:1px solid var(--line);border-radius:var(--r-l);overflow:hidden;position:sticky;top:18px}\n/* ---- rival detail: top row = compact player+facts | win probability ---- */\n.d-stack{display:flex;flex-direction:column;gap:16px}\n.d-top{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:16px;align-items:stretch}\n.idp.compact{position:static;border-radius:var(--r-l);display:flex;flex-direction:column}\n.idp.compact .idp-hd{flex-direction:row;text-align:left;align-items:center;gap:12px;padding:13px 15px 11px;background:linear-gradient(110deg,rgba(242,108,54,.16),rgba(242,108,54,0) 70%)}\n.idp.compact .av{width:48px;height:48px;font-size:18px}\n.idp.compact .idp-id{flex:1;min-width:0}\n.idp.compact .idp-id h2{font-size:17px}\n.idp.compact .idp-meta{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex:none}\n.idp.compact .idp-facts{padding:0 12px 12px;grid-template-columns:1fr;gap:6px}\n.idp.compact .idp-fact{padding:7px 10px 7px 12px}\n.idp-fact.good::before{background:var(--mint,#36D9B0)}\n.idp-fact.bad::before{background:var(--loss,#FF5B5B)}\n.d-prob{display:flex}\n.d-prob > .d-block{flex:1;margin:0}\n@media(max-width:760px){.d-top{grid-template-columns:1fr}}\n.idp-hd{padding:26px 22px 20px;display:flex;flex-direction:column;align-items:center;gap:13px;text-align:center;background:linear-gradient(180deg,rgba(242,108,54,.16),rgba(242,108,54,0) 78%)}\n.idp .av{width:84px;height:84px;border-radius:50%;flex:none;display:grid;place-items:center;font-family:var(--head);font-weight:900;font-size:30px;color:#15120e;overflow:hidden;box-shadow:0 0 0 3px rgba(255,255,255,.10)}\n.idp .av img{width:100%;height:100%;object-fit:cover}\n.idp-id h2{font-family:var(--head);font-weight:800;font-size:21px;line-height:1.1}\n.idp-id .sub{font-family 11px;border-radius:999px;border:1.5px solid var(--line)}\n.tpl-chip.free{color:#46D6A6;border-color:rgba(70,214,166,.45);background:rgba(70,214,166,.10)}\n.tpl-chip.pro{color:#F4C14B;border-color:rgba(244,193,75,.5);background:rgba(244,193,75,.12)}\n.tpl-badge{position:absolute;top:10px;left:10px;font-family:var(--mono);font-size:9.5px;font-weight:800;letter-spacing:.06em;\n  padding:4px 9px;border-radius:999px;display:inline-flex;align-items:center;gap:3px;backdrop-filter:blur(4px);z-index:2}\n.tpl-badge.free{background:rgba(70,214,166,.92);color:#04231a}\n.tpl-badge.pro{background:linear-gradient(120deg,#F4C14B,#E89A1C);color:#3a2400;box-shadow:0 2px 8px rgba(232,154,28,.35)}\n.tpl-card.is-pro{border-color:rgba(244,193,75,.38)}\n.tpl-card.is-pro:hover{border-color:#F4C14B}\n.tpl-card.locked .tpl-thumb svg{filter:saturate(.5) brightness(.62)}\n.tpl-lock{position:absolute;inset:0;display:grid;place-items:center;font-size:24px;color:#fff;z-index:1}\n.tpl-lock svg{width:26px;height:26px;filter:drop-shadow(0 2px 6px rgba(0,0,0,.6))}\n.tpl-lvl{font-family:var(--mono);font-style:normal;font-weight:700;font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--txt-3);margin-left:4px}\n\n/* onboarding */\n.ob-modal{width:min(520px,100%);text-align:left;overflow:hidden}\n.ob-hero{padding:30px 26px 22px;text-align:center;background:radial-gradient(420px 200px at 50% -20%, rgba(215,242,58,.16), transparent 70%);border-bottom:1px solid var(--line)}\n.ob-ball{width:64px;height:64px;margin:0 auto 14px;animation:ob-spin 8s linear infinite}\n.ob-ball svg{width:100%;height:100%;filter:drop-shadow(0 6px 12px rgba(0,0,0,.25))}\n@keyframes ob-spin{to{transform:rotate(360deg)}}\n.ob-hero h2{font-size:26px;text-transform:uppercase}\n.ob-hero p{color:var(--txt-2);font-size:14px;margin-top:6px}\n.ob-steps{display:flex;flex-direction:column;gap:14px}\n.ob-step{display:flex;align-items:flex-start;gap:13px}\n.ob-n{width:24px;height:24px;border-radius:50%;background:var(--ball);color:var(--ball-ink);font-family:var(--head);font-weight:800;font-size:13px;display:grid;place-items:center;flex:none}\n.ob-ic{width:38px;height:38px;border-radius:11px;background:var(--ink-3);display:grid;place-items:center;flex:none}\n.ob-ic svg{width:20px;height:20px;color:var(--ball)}\n.ob-step b{display:block;font-family:var(--head);font-weight:700;font-size:15px;margin-bottom:2px}\n.ob-step > div span{color:var(--txt-3);font-size:13px;line-height:1.4}\n.ob-foot{justify-content:space-between}\n\n/* onboarding — showcase carousel (v2) */\n.ob-modal2{width:min(460px,100%);padding:0;overflow:hidden;position:relative;text-align:left}\n.ob-x{position:absolute;top:12px;right:12px;z-index:3;width:34px;height:34px;border:0;border-radius:50%;\n  background:rgba(0,0,0,.28);color:#fff;display:grid;place-items:center;cursor:pointer;backdrop-filter:blur(4px)}\n.ob-x svg{width:16px;height:16px}\n.ob-track{display:flex;width:100%;transition:transform .42s cubic-bezier(.4,.05,.2,1);touch-action:pan-y}\n.ob-slide{flex:0 0 100%;min-width:100%}\n.ob-viz{height:240px;display:grid;place-items:center;padding:22px 22px 0;\n  background:radial-gradient(360px 180px at 50% 0%, color-mix(in srgb,var(--ball) 14%,transparent), transparent 70%)}\n.ob-copy{padding:18px 26px 6px}\n.ob-copy .ob-ic{width:42px;height:42px;border-radius:12px;background:var(--ink-3);display:grid;place-items:center;margin-bottom:12px}\n.ob-copy .ob-ic svg{width:22px;height:22px;color:var(--ball)}\n.ob-copy h2{font-family:var(--head);font-weight:800;font-size:23px;line-height:1.08;text-transform:none;letter-spacing:-.01em}\n.ob-copy p{color:var(--txt-2);font-size:14px;line-height:1.5;margin-top:8px;text-wrap:pretty}\n/* slide 1 — mini court */\n.ob-court{position:relative;width:170px;height:218px}\n.ob-court svg{width:100%;height:100%;border-radius:12px;background:linear-gradient(160deg,#C76B43,#A8542F);\n  box-shadow:0 12px 30px rgba(0,0,0,.32),inset 0 0 0 1px rgba(255,255,255,.06)}\n.ob-court-play{position:absolute;left:50%;bottom:-9px;transform:translateX(-50%);width:34px;height:34px;border-radius:50%;\n  background:var(--ball);color:var(--ball-ink);display:grid;place-items:center;box-shadow:0 6px 16px rgba(0,0,0,.3)}\n.ob-court-play svg{width:16px;height:16px;background:none;box-shadow:none;border-radius:0}\n/* demo cards (rivals / matches / progress) */\n.ob-demo-card{width:100%;max-width:320px;background:var(--ink-2);border:1px solid var(--line-2);border-radius:16px;\n  padding:15px 16px;box-shadow:0 12px 30px rgba(0,0,0,.28)}\n.ob-rc-top{display:flex;align-items:center;gap:11px}\n.ob-rc-av{width:42px;height:42px;border-radius:12px;background:#E8703D;color:#fff;font-family:var(--head);font-weight:800;\n  font-size:15px;display:grid;place-items:center;flex:none}\n.ob-rc-id{flex:1;min-width:0}\n.ob-rc-id b{display:block;font-family:var(--head);font-weight:700;font-size:15px}\n.ob-rc-id span{font-size:12px;color:var(--txt-3)}\n.ob-rc-badge{font-family:var(--mono);font-size:9.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;\n  color:var(--mint);background:color-mix(in srgb,var(--mint) 16%,transparent);padding:3px 7px;border-radius:999px;flex:none}\n.ob-rc-facts{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:13px}\n.ob-rc-facts > div{background:var(--ink-3);border-radius:10px;padding:8px 9px}\n.ob-rc-facts span{display:block;font-size:10px;color:var(--txt-3);text-transform:uppercase;letter-spacing:.03em}\n.ob-rc-facts b{font-size:12px;font-weight:600;line-height:1.2;display:block;margin-top:3px}\n.ob-matches{display:flex;flex-direction:column;gap:9px}\n.ob-m-row{display:flex;align-items:center;gap:10px}\n.ob-m-dot{width:8px;height:8px;border-radius:50%;flex:none}\n.ob-m-id{flex:1;min-width:0}\n.ob-m-id b{display:block;font-family:var(--head);font-weight:700;font-size:13.5px}\n.ob-m-id span{font-size:11px;color:var(--txt-3)}\n.ob-m-score{font-family:var(--mono);font-size:12px;color:var(--txt-2);letter-spacing:-.01em}\n.ob-m-pill{width:22px;height:22px;border-radius:7px;display:grid;place-items:center;font-family:var(--head);font-weight:800;\n  font-size:12px;flex:none}\n.ob-m-pill.win{background:color-mix(in srgb,var(--mint) 22%,transparent);color:var(--mint)}\n.ob-m-pill.loss{background:color-mix(in srgb,#FF5B5B 20%,transparent);color:#FF8B8B}\n.ob-progress{display:flex;flex-direction:column;gap:16px}\n.ob-pg-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}\n.ob-pg-stat{text-align:center}\n.ob-pg-stat b{font-family:var(--head);font-weight:800;font-size:22px;color:var(--ball);display:block}\n.ob-pg-stat span{font-size:10.5px;color:var(--txt-3);text-transform:uppercase;letter-spacing:.03em}\n.ob-pg-bars{display:flex;align-items:flex-end;gap:8px;height:64px;padding-top:4px}\n.ob-pg-bars span{flex:1;background:linear-gradient(180deg,var(--ball),color-mix(in srgb,var(--ball) 40%,transparent));\n  border-radius:5px 5px 0 0;min-height:8px}\n/* dots + footer */\n.ob-dots{display:flex;justify-content:center;gap:7px;padding:14px 0 2px}\n.ob-dots span{width:7px;height:7px;border-radius:50%;background:var(--line-2);transition:all .25s}\n.ob-dots span.on{background:var(--ball);width:20px}\n.ob-foot2{display:flex;justify-content:space-between;align-items:center;padding:10px 22px 20px;gap:10px}\n.ob-foot2 .btn{flex:1;justify-content:center}\n.ob-start-row{display:flex;flex-direction:column;gap:9px;padding:6px 22px 20px}\n.ob-start-row .btn{width:100%;justify-content:center}\n@media(prefers-reduced-motion:reduce){.ob-track{transition:none}.ob-court svg circle animateMotion{display:none}}\n\n/* dashboard — demo data banner */\n.demo-banner{display:flex;align-items:center;gap:14px;padding:13px 16px;border-radius:var(--r-l);\n  background:linear-gradient(135deg,color-mix(in srgb,var(--mint) 14%,var(--ink-2)),var(--ink-2));\n  border:1px solid color-mix(in srgb,var(--mint) 30%,var(--line))}\n.db-tag{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.06em;color:var(--ball-ink);\n  b var(--ball)}\n.onb-num svg{width:18px;height:18px}\n.onb-ico svg{width:18px;height:18px}\n.onb-tx{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}\n.onb-tx b{font-family:var(--head);font-weight:700;font-size:14.5px}\n.onb-tx span{font-size:12.5px;color:var(--txt-3);line-height:1.35}\n.onb-go{flex:none;color:var(--txt-3);font-family:var(--mono);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}\n.onb-go svg{width:18px;height:18px;display:block}\n.onb-step.done{background:color-mix(in srgb,var(--mint) 9%,var(--ink-3));border-color:color-mix(in srgb,var(--mint) 28%,var(--line));cursor:default}\n.onb-step.done .onb-num{background:var(--mint);color:var(--ink)}\n.onb-step.done .onb-tx b{color:var(--txt-2)}\n.onb-step.done .onb-go{color:var(--mint)}\n\n/* shortcuts */\n.kb-list{display:flex;flex-direction:column;gap:9px}\n.kb-row{display:flex;align-items:center;gap:14px;font-size:14px;color:var(--txt-2)}\n.kb-row kbd{font-family:var(--mono);font-size:12px;font-weight:700;background:var(--ink);border:1px solid var(--line-2);border-bottom-width:2px;border-radius:7px;padding:6px 10px;min-width:54px;text-align:center;color:var(--txt)}\n\n@media(max-width:680px){\n  .dash{grid-template-columns:repeat(2,1fr)}\n  .dstat-n{font-size:24px}\n  .tpl-grid{grid-template-columns:1fr}\n  .search-box input{width:120px}\n}\n\n/* tags */\n.tcard-tag{position:absolute;bottom:10px;left:10px;font-family:var(--mono);font-size:9px;font-weight:700;\n  letter-spacing:.08em;text-transform:uppercase;padding:4px 8px;border-radius:6px;color:#16180c;box-shadow:0 2px 8px rgba(0,0,0,.25)}\n.tag-pick{display:flex;flex-wrap:wrap;gap:7px}\n.tagopt{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;padding:8px 12px;border-radius:999px;\n  background:var(--ink);border:1.5px solid var(--line);color:var(--txt-2);transition:.13s}\n.tagopt:hover{border-color:var(--line-2)}\n.tagopt.on{border-color:var(--txt);color:var(--txt)}\n.tagdot{width:11px;
