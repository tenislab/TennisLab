<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"/>
  <title>CourtLab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;700;800;900&family=Hanken+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/styles.css"/>
  <link rel="manifest" href="manifest.webmanifest"/>
  <meta name="theme-color" content="#121110"/>
  <link rel="icon" href="icon.svg" type="image/svg+xml"/>
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="CourtLab"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <script>
    window.__tlStart = performance.now();
    document.documentElement.dataset.theme = localStorage.getItem('tl_theme') || 'dark';
    // reduce-animations: 'on' forces off, 'off' forces on, 'auto' (default) follows the system
    (function(){
      var m = localStorage.getItem('tl_reduce_anim') || 'auto';
      var sys = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (m === 'on' || (m === 'auto' && sys)) document.documentElement.classList.add('no-anim');
    })();
  </script>
</head>
<body>
  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
      <rect width="400" height="400" rx="64" fill="#121110"/>
      <rect x="140" y="96" width="120" height="208" rx="14" fill="none" stroke="#E8703D" stroke-width="18"/>
      <line x1="140" y1="200" x2="260" y2="200" stroke="#E8703D" stroke-width="18"/>
      <line x1="200" y1="96" x2="200" y2="304" stroke="#E8703D" stroke-width="11" opacity=".6"/>
    </svg>
  </template>

  <div class="bg-grid"></div>

  <div id="loader" class="loader">
    <div class="loader-inner">
      <div class="bounce">
        <div class="tl-ball">
          <svg viewBox="0 0 60 60" aria-hidden="true">
            <rect x="18" y="8" width="24" height="44" rx="3" fill="none" stroke="#E8703D" stroke-width="3.2"/>
            <line x1="18" y1="30" x2="42" y2="30" stroke="#E8703D" stroke-width="3.2"/>
            <line x1="30" y1="8" x2="30" y2="52" stroke="#E8703D" stroke-width="2" opacity=".6"/>
          </svg>
        </div>
        <div class="shadow"></div>
      </div>
      <div class="loader-word">Court<span>Lab</span></div>
      <div class="loader-bar"><i></i></div>
    </div>
  </div>

  <div class="app">
    <header class="topbar" id="topbar"></header>
    <main id="root"></main>
    <nav class="tabbar" id="tabbar"></nav>
  </div>

  <script src="js/icons.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/court.js"></script>
  <script src="js/heatmap.js"></script>
  <script src="js/winprob.js"></script>
  <script src="js/store.js"></script>
  <script src="js/animation.js"></script>
  <script src="js/gif.js"></script>
  <script src="js/fx.js"></script>
  <script src="js/editor.js"></script>
  <script src="js/modals.js"></script>
  <script src="js/rivals.js"></script>
  <script src="js/matches.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/premium.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/cloud.js"></script>
  <script src="js/social.js"></script>
  <script src="js/club.js"></script>
  <script src="js/league.js"></script>
  <script src="js/extras.js"></script>
  <script src="js/proplays.js"></script>
  <script src="js/achievements.js"></script>
  <script src="js/referrals.js"></script>
  <script src="js/planner.js"></script>
  <script src="js/session.js"></script>
  <script src="js/home.js"></script>
  <script src="js/a11y.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
