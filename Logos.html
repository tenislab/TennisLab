<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Logos — TennisLab</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  :root{--ink:#121110;--ink-2:#1B1815;--line:rgba(255,236,222,.12);--txt:#F4EEE7;--txt-3:#766C62;--ball:#E8703D;--ball-ink:#1E0D04;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#121110;color:var(--txt);font-family:'Archivo',sans-serif;padding:40px clamp(16px,5vw,60px);min-height:100vh}
  h1{font-size:clamp(24px,4vw,38px);text-transform:uppercase;letter-spacing:-.02em}
  .sub{font-family:'Space Mono',monospace;color:var(--txt-3);font-size:13px;letter-spacing:.1em;text-transform:uppercase;margin:6px 0 32px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px}
  .card{background:var(--ink-2);border:1px solid var(--line);border-radius:20px;padding:26px 22px;display:flex;flex-direction:column;align-items:center;gap:18px;transition:.15s}
  .card:hover{border-color:var(--ball)}
  .mark-row{display:flex;align-items:center;gap:14px}
  .mark{width:64px;height:64px;flex:none}
  .lockup{display:flex;align-items:center;gap:12px}
  .lockup .nm{font-weight:900;font-size:18px;line-height:1;letter-spacing:-.01em}
  .lockup .nm small{display:block;font-family:'Space Mono',monospace;font-weight:400;font-size:9px;letter-spacing:.24em;color:var(--txt-3);margin-top:4px}
  .opt-n{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ball)}
  .desc{font-family:'Space Mono',monospace;font-size:11px;color:var(--txt-3);text-align:center;line-height:1.5}
  .lightswatch{margin-top:8px;background:#F3EDE5;border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px}
  .lightswatch .mini{width:40px;height:40px}
</style>
</head>
<body>
  <h1>Opciones de logo</h1>
  <div class="sub">TennisLab · dime el número que más te guste</div>
  <div class="grid" id="grid"></div>

<script>
const TER='#E8703D', INK='#1E0D04', DARK='#121110';
// each logo is an SVG string (40x40 viewBox base, we scale)
const logos = [
  {n:'01', d:'Pelota + costuras (actual mejorado)', svg:tile(`
    <circle cx="20" cy="20" r="12" fill="${TER}"/>
    <path d="M9 15 Q20 23 31 15" fill="none" stroke="${INK}" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M9 25 Q20 17 31 25" fill="none" stroke="${INK}" stroke-width="2.2" stroke-linecap="round"/>`)},
  {n:'02', d:'Monograma JRR', svg:tile(`
    <text x="20" y="26" font-family="Archivo, sans-serif" font-weight="900" font-size="15" fill="${TER}" text-anchor="middle" letter-spacing="-1">JRR</text>`)},
  {n:'03', d:'Pelota en trazo + estela', svg:tile(`
    <path d="M10 30 Q16 14 30 11" fill="none" stroke="${TER}" stroke-width="2.4" stroke-linecap="round" opacity=".55"/>
    <circle cx="29" cy="12" r="5.4" fill="${TER}"/>
    <path d="M24.6 10 Q29 13.5 33 10.6" fill="none" stroke="${INK}" stroke-width="1.4" stroke-linecap="round"/>`)},
  {n:'04', d:'Pista cenital (laboratorio)', svg:tile(`
    <rect x="12" y="8" width="16" height="24" rx="2" fill="none" stroke="${TER}" stroke-width="2"/>
    <line x1="12" y1="20" x2="28" y2="20" stroke="${TER}" stroke-width="2"/>
    <line x1="20" y1="8" x2="20" y2="32" stroke="${TER}" stroke-width="1.3" opacity=".6"/>`)},
  {n:'05', d:'Una sola costura (minimal)', svg:tile(`
    <circle cx="20" cy="20" r="12.5" fill="none" stroke="${TER}" stroke-width="2.4"/>
    <path d="M11 13 Q20 20 11 28" fill="none" stroke="${TER}" stroke-width="2.4" stroke-linecap="round"/>`)},
  {n:'06', d:'Monograma TL', svg:tile(`
    <text x="20" y="26" font-family="Archivo, sans-serif" font-weight="900" font-size="17" fill="${TER}" text-anchor="middle" letter-spacing="-1">TL</text>`)},
  {n:'07', d:'Pelota sólida + raqueta', svg:tile(`
    <circle cx="17" cy="17" r="8" fill="${TER}"/>
    <path d="M9 12 Q17 18 25 12" fill="none" stroke="${INK}" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="24" y1="24" x2="32" y2="32" stroke="${TER}" stroke-width="2.6" stroke-linecap="round"/>
    <circle cx="22" cy="22" r="4" fill="none" stroke="${TER}" stroke-width="2.2"/>`)},
  {n:'08', d:'Bloque "TENNIS LAB"', svg:tile(`
    <rect x="7" y="13" width="26" height="14" rx="3" fill="${TER}"/>
    <text x="20" y="22.6" font-family="Archivo, sans-serif" font-weight="900" font-size="7" fill="${INK}" text-anchor="middle" letter-spacing="0">LAB</text>`)},
];

function tile(inner){
  return `<svg viewBox="0 0 40 40" class="mark"><rect width="40" height="40" rx="12" fill="${'#1B1815'}" stroke="rgba(255,236,222,.10)"/>${inner}</svg>`;
}
function tileLight(inner){
  return `<svg viewBox="0 0 40 40" class="mini"><rect width="40" height="40" rx="12" fill="#fff"/>${inner}</svg>`;
}

const grid = document.getElementById('grid');
logos.forEach(l=>{
  const card=document.createElement('div');card.className='card';
  card.innerHTML = `
    <span class="opt-n">OPCIÓN ${l.n}</span>
    <div class="mark-row">${l.svg}</div>
    <div class="lockup">${l.svg.replace('class="mark"','class="mark" style="width:42px;height:42px"')}
      <span class="nm">TennisLab<small>PIZARRA TÁCTICA</small></span>
    </div>
    <div class="desc">${l.d}</div>`;
  grid.appendChild(card);
});
</script>
</body>
</html>
